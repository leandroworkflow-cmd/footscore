<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FootScore Pro вАФ Futebol ao Vivo, Stats & Odds</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b25;--bg3:#1a2235;--bgh:#1e2840;--bgc:#212d45;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --accent:#00d68f;--accent-dim:rgba(0,214,143,0.12);--accent2:#0ea5e9;
  --text:#eef0f5;--text2:#7d8fa8;--text3:#3d4f68;
  --live:#f43f5e;--live-dim:rgba(244,63,94,0.12);
  --yellow:#f59e0b;--yellow-dim:rgba(245,158,11,0.12);
  --green:#10b981;--green-dim:rgba(16,185,129,0.12);
  --purple:#8b5cf6;--purple-dim:rgba(139,92,246,0.12);
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --r:8px;--r2:14px;--sw:250px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:var(--font);cursor:pointer;border:none;background:none}
img{display:block}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* LAYOUT */
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;z-index:100;transition:transform .25s}
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column}
.topbar{display:none;align-items:center;gap:12px;padding:0 16px;height:56px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99}
.page{flex:1;max-width:1000px;width:100%;margin:0 auto;padding:0 0 60px}

/* SIDEBAR */
.logo{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.logo-ball{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-name{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-name em{font-style:normal;color:var(--accent)}
.logo-pro{font-size:9px;font-weight:700;background:var(--accent-dim);color:var(--accent);padding:1px 5px;border-radius:4px;margin-left:4px;vertical-align:middle}
.nav-group{padding:6px 10px}
.nav-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);padding:12px 10px 5px}
.nitem{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);color:var(--text2);font-size:13px;transition:all .15s;cursor:pointer;width:100%;text-align:left;border:none;background:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nitem:hover{background:var(--bgh);color:var(--text)}
.nitem.on{background:var(--accent-dim);color:var(--accent);font-weight:600}
.nitem .flag{font-size:15px;flex-shrink:0}
.live-pip{margin-left:auto;font-size:9px;font-weight:700;background:var(--live-dim);color:var(--live);padding:2px 6px;border-radius:99px;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.sb-foot{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}

/* TOPBAR */
.tb-menu{color:var(--text2);padding:6px;border-radius:6px;font-size:20px;display:flex;align-items:center}
.tb-menu:hover{background:var(--bgh);color:var(--text)}
.tb-logo{font-size:16px;font-weight:700;flex:1}

/* HERO BANNER */
.hero{background:linear-gradient(135deg,#0d1f35 0%,#0f2744 50%,#0d1a30 100%);border-bottom:1px solid var(--border);padding:28px 24px 24px;position:relative;overflow:hidden}
.hero::before{content:'вЪљ';position:absolute;right:-10px;top:-20px;font-size:160px;opacity:.04;line-height:1}
.hero h1{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
.hero h1 span{color:var(--accent)}
.hero p{font-size:14px;color:var(--text2);margin-bottom:16px}
.hero-pills{display:flex;gap:8px;flex-wrap:wrap}
.hpill{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:5px 10px;border-radius:99px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;background:rgba(255,255,255,.04)}
.hpill:hover,.hpill.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* SECTION */
.sec{padding:20px 24px 0}
.sec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* CARDS */
.cards-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;min-width:130px;flex-shrink:0}
.stat-card.accent{border-color:rgba(0,214,143,.25);background:linear-gradient(135deg,rgba(0,214,143,.08),rgba(14,165,233,.05))}
.sc-label{font-size:11px;color:var(--text3);margin-bottom:5px}
.sc-val{font-size:24px;font-weight:800;font-family:var(--mono);color:var(--text)}
.sc-sub{font-size:11px;color:var(--text3);margin-top:3px}
.sc-trend{font-size:11px;font-weight:600;color:var(--green)}

/* MATCH CARDS */
.match-list{display:flex;flex-direction:column;gap:0}
.match-grp{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:12px}
.grp-head{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.grp-date{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.grp-n{font-size:11px;color:var(--text3)}
.mcard{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;gap:6px;position:relative}
.mcard:last-child{border-bottom:none}
.mcard:hover{background:var(--bgh)}
.mcard.live{background:rgba(244,63,94,.04)}
.mcard.live::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--live);border-radius:0}
.mteam{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.mteam.away{flex-direction:row-reverse}
.tcrest{width:24px;height:24px;object-fit:contain;flex-shrink:0}
.tname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tname.r{text-align:right}
.tname.win{font-weight:700;color:var(--text)}
.tname.lose{color:var(--text3)}
.mcenter{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0;min-width:78px}
.mscore{font-size:17px;font-weight:800;font-family:var(--mono);display:flex;align-items:center;gap:5px;color:var(--text)}
.mscore-sep{color:var(--text3);font-weight:300}
.mtime{font-size:14px;font-weight:700;font-family:var(--mono);color:var(--text2)}
.badge-live{display:inline-flex;align-items:center;gap:3px;background:var(--live-dim);color:var(--live);font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.03em}
.badge-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--live);animation:pulse 1.2s infinite}
.badge-ft{font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.04em}
.badge-ns{font-size:10px;color:var(--text2)}

/* ODDS STRIP */
.odds-strip{display:flex;gap:4px;margin-top:6px;align-items:center}
.odd-box{flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 6px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.odd-box:hover{border-color:var(--yellow);background:var(--yellow-dim)}
.odd-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.odd-val{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--yellow)}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;background:var(--bg2);position:sticky;top:0;z-index:80}
.tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;cursor:pointer;transition:color .15s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* FILTERS */
.filters{display:flex;gap:8px;padding:14px 24px;flex-wrap:wrap}
.filt{font-size:12px;font-weight:500;padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.filt:hover{border-color:var(--border2);color:var(--text)}
.filt.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* STANDINGS */
.st-wrap{overflow-x:auto}
.st-table{width:100%;border-collapse:collapse;font-size:13px;min-width:580px}
.st-table th{padding:10px 10px;text-align:center;font-size:10px;font-weight:700;color:var(--text3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.05em}
.st-table th:nth-child(2){text-align:left}
.st-table td{padding:10px 10px;text-align:center;color:var(--text2);border-bottom:1px solid var(--border);font-size:13px}
.st-table tr:last-child td{border-bottom:none}
.st-table tr:hover td{background:var(--bgh)}
.st-table td.tn{text-align:left}
.tcell{display:flex;align-items:center;gap:8px}
.pnum{display:inline-flex;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.p-cl{background:var(--accent-dim);color:var(--accent)}
.p-el{background:var(--yellow-dim);color:var(--yellow)}
.p-rl{background:var(--live-dim);color:var(--live)}
.sg+{color:var(--green);font-weight:600}
.sg-{color:var(--live);font-weight:600}
.z-cl td:first-child{border-left:3px solid var(--accent)}
.z-el td:first-child{border-left:3px solid var(--yellow)}
.z-rl td:first-child{border-left:3px solid var(--live)}
.form-r{display:flex;gap:2px;justify-content:center}
.fb{display:inline-flex;width:17px;height:17px;border-radius:50%;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.fw{background:var(--green-dim);color:var(--green)}
.fd{background:var(--yellow-dim);color:var(--yellow)}
.fl{background:var(--live-dim);color:var(--live)}
.leg-row{display:flex;gap:16px;padding:12px 16px;border-top:1px solid var(--border);flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.ldot{width:8px;height:8px;border-radius:50%}

/* PLAYERS */
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;padding:4px 0}
.player-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:16px;display:flex;gap:12px;cursor:pointer;transition:all .15s}
.player-card:hover{border-color:var(--border2);background:var(--bgh)}
.player-photo{width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--bg2)}
.player-info{flex:1;min-width:0}
.player-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-pos{font-size:11px;color:var(--text3);margin-bottom:8px}
.player-stats{display:flex;gap:12px}
.pstat{display:flex;flex-direction:column;align-items:center}
.pstat-val{font-size:16px;font-weight:800;font-family:var(--mono);color:var(--accent)}
.pstat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.player-rating{position:relative;width:36px;height:36px;flex-shrink:0}
.rating-circle{width:36px;height:36px;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--pct)*1%),var(--bg2) 0);display:flex;align-items:center;justify-content:center}
.rating-inner{width:26px;height:26px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--accent);font-family:var(--mono)}

/* ODDS PANEL */
.odds-panel{display:flex;flex-direction:column;gap:12px}
.odds-match{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.odds-match-head{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border)}
.omh-teams{flex:1;font-size:13px;font-weight:600}
.omh-date{font-size:11px;color:var(--text3)}
.odds-bookmakers{display:flex;flex-direction:column;gap:0}
.odds-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:12px}
.odds-row:last-child{border-bottom:none}
.odds-bm{font-size:12px;font-weight:600;color:var(--text2);min-width:90px}
.odds-vals{display:flex;gap:6px;flex:1}
.oval{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 10px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.oval:hover{border-color:var(--yellow);background:var(--yellow-dim)}
.oval-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.oval-val{font-size:14px;font-weight:800;font-family:var(--mono);color:var(--yellow)}
.oval-pct{font-size:10px;color:var(--text3)}
.best-odd{border-color:var(--yellow)!important;background:var(--yellow-dim)!important}
.best-odd .oval-val{color:var(--yellow)}

/* DETAIL */
.detail-hero-wrap{background:linear-gradient(135deg,#0d1f35,#0f2744);border-bottom:1px solid var(--border);padding:0}
.d-comp{display:flex;align-items:center;gap:8px;padding:12px 24px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text2)}
.d-comp img{width:16px;height:16px;object-fit:contain}
.d-score-wrap{display:flex;align-items:center;padding:32px 24px 24px;gap:12px}
.d-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.d-crest{width:64px;height:64px;object-fit:contain}
.d-tname{font-size:14px;font-weight:600;color:var(--text2);line-height:1.3}
.d-tname.win{color:var(--text);font-weight:700}
.d-score{font-size:48px;font-weight:900;font-family:var(--mono);display:flex;align-items:center;gap:8px;flex-shrink:0}
.d-score-sep{color:var(--text3);font-weight:300}
.d-ht{font-size:12px;color:var(--text3);text-align:center}
.d-meta{text-align:center;padding:0 24px 20px;font-size:12px;color:var(--text3)}
.d-status{font-size:12px;text-align:center;padding-bottom:4px}

/* STAT BARS */
.stat-section{padding:16px}
.stat-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:14px}
.sbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sbar-val{font-size:13px;font-weight:700;min-width:36px}
.sbar-val.l{text-align:right;color:var(--accent)}
.sbar-val.r{color:var(--accent2)}
.sbar-mid{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.sbar-label{font-size:11px;color:var(--text3)}
.sbar-track{display:flex;width:100%;height:5px;border-radius:3px;overflow:hidden;background:var(--bg2)}
.sbar-l{height:5px;background:var(--accent)}
.sbar-r{height:5px;background:var(--accent2)}

/* EVENTS */
.events-wrap{display:flex;flex-direction:column;gap:6px;padding:12px 16px}
.ev-row{display:flex;align-items:center;gap:8px;padding:6px 0}
.ev-min{font-size:11px;font-weight:700;color:var(--accent);font-family:var(--mono);min-width:28px}
.ev-icon{font-size:14px;width:24px;text-align:center;flex-shrink:0}
.ev-info{flex:1}
.ev-player{font-size:13px;font-weight:600}
.ev-detail{font-size:11px;color:var(--text3)}
.ev-team{font-size:11px;color:var(--text3);text-align:right}

/* LOADING / ERROR */
.loading{text-align:center;padding:60px 20px;color:var(--text2)}
.spinner{display:inline-block;width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.errbox{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:12px;text-align:center}
.errbox .eico{font-size:36px}
.errbox .etitle{font-size:16px;font-weight:700}
.errbox .emsg{font-size:13px;color:var(--text2);max-width:400px;line-height:1.6}
.retry{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:9px 18px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bgh);color:var(--text);cursor:pointer}
.retry:hover{background:var(--bgc)}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-ico{font-size:40px;margin-bottom:10px}
.back-btn{display:inline-flex;align-items:center;gap:6px;margin:16px 24px 8px;font-size:13px;color:var(--text2);cursor:pointer;background:none;border:none;transition:color .15s}
.back-btn:hover{color:var(--text)}
.card-wrap{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin:0 24px 14px}
.card-head{padding:12px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);border-bottom:1px solid var(--border)}

/* LEAGUE PICKER */
.lpicker{display:flex;flex-wrap:wrap;gap:8px;padding:16px 24px}
.lpill{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:99px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.lpill:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay{display:block}
  .main{margin-left:0}
  .topbar{display:flex}
  .overlay.hidden{display:none}
  .player-grid{grid-template-columns:1fr}
  .d-score{font-size:36px}
  .d-crest{width:48px;height:48px}
  .sec{padding:16px 16px 0}
  .tabs{padding:0 16px}
  .filters{padding:12px 16px}
}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div class="logo-ball">вЪљ</div>
    <div>
      <div class="logo-name">Foot<em>Score</em><span class="logo-pro">PRO</span></div>
      <div style="font-size:10px;color:var(--text3);margin-top:1px">Resultados ¬Ј Stats ¬Ј Odds</div>
    </div>
  </div>
  <div class="nav-group">
    <button class="nitem on" onclick="nav('home')" id="n-home">рЯП† In√≠cio</button>
    <button class="nitem" onclick="nav('live')" id="n-live">рЯФі Ao Vivo <span class="live-pip">LIVE</span></button>
  </div>
  <div class="nav-title">Ligas</div>
  <div class="nav-group" id="nav-leagues"></div>
  <div class="sb-foot">API-Football ¬Ј RapidAPI<br>Plano gratuito: 100 req/dia</div>
</aside>

<div class="overlay hidden" id="overlay" onclick="closeSB()"></div>

<div class="main">
  <div class="topbar">
    <button class="tb-menu" onclick="toggleSB()">вШ∞</button>
    <span class="tb-logo">вЪљ FootScore <em style="color:var(--accent);font-style:normal">PRO</em></span>
  </div>
  <div class="page" id="page">
    <div class="loading"><div class="spinner"></div><br>Iniciando...</div>
  </div>
</div>

<script>

async function api(path) {
  const key = path
  if (cache[key]) return cache[key]
  const r = await fetch(`${API_BASE}${path}`, { headers: HEADERS })
  if (!r.ok) throw new Error(`Erro ${r.status}`)
  const data = await r.json()
  if (data.errors && Object.keys(data.errors).length) {
    const msg = Object.values(data.errors)[0]
    throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg))
  }
  cache[key] = data
  return data
}

      </div>
      <div class="d-score-wrap">
        <div class="d-team">
          <img class="d-crest" src="${f.teams.home.logo}" onerror="this.style.display='none'" />
          <span class="d-tname ${homeWin?'win':''}">${f.teams.home.name}</span>
        </div>
        <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:130px">
          ${h!==null?`<div class="d-score">
            <span style="${homeWin?'color:var(--accent)':isFinished&&awayWin?'color:var(--text3)':''}">${h}</span>
            <span class="d-score-sep">вАФ</span>
            <span style="${awayWin?'color:var(--accent2)':isFinished&&homeWin?'color:var(--text3)':''}">${a}</span>
          </div>
          ${f.score.halftime.home!==null?`<div class="d-ht">Intervalo ${f.score.halftime.home}вАФ${f.score.halftime.away}</div>`:''}
          <div class="d-status">${isFinished?'<span style="color:var(--text3);font-size:12px">вђ§ Finalizado</span>':f.fixture.status.short==='1H'||f.fixture.status.short==='2H'?'<span class="badge-live">AO VIVO</span>':''}</div>`
          :`<div class="d-score" style="font-size:28px;color:var(--text3)">VS</div>`}
        </div>
        <div class="d-team">
          <img class="d-crest" src="${f.teams.away.logo}" onerror="this.style.display='none'" />
          <span class="d-tname ${awayWin?'win':''}">${f.teams.away.name}</span>
        </div>
      </div>
      <div class="d-meta">${dateStr}${f.fixture.venue.name?' ¬Ј '+f.fixture.venue.name:''}</div>
    </div>`

    // STATS
    if(homeStats.length){
      html += `<div class="card-wrap"><div class="card-head">рЯУК Estat√≠sticas</div><div class="stat-section">`
      statPairs.forEach(([label, key, unit])=>{
        let hv = getStat(homeStats, key)
        let av = getStat(awayStats, key)
        if(unit==='%'){ hv=parseInt(hv)||0; av=parseInt(av)||0 }
        else { hv=parseInt(hv)||0; av=parseInt(av)||0 }
        const tot = hv+av||1
        const pct = Math.round(hv/tot*100)
        html += `<div class="sbar-row">
          <span class="sbar-val l">${hv}${unit}</span>
          <div class="sbar-mid">
            <span class="sbar-label">${label}</span>
            <div class="sbar-track">
              <div class="sbar-l" style="width:${pct}%"></div>
              <div class="sbar-r" style="width:${100-pct}%"></div>
            </div>
          </div>
          <span class="sbar-val r">${av}${unit}</span>
        </div>`
      })
      html += `</div></div>`
    }

    // EVENTS
    if(events.length){
      const goals_ev = events.filter(e=>e.type==='Goal')
      const cards_ev = events.filter(e=>e.type==='Card')
      const subs_ev  = events.filter(e=>e.type==='subst')

      if(goals_ev.length){
        html += `<div class="card-wrap"><div class="card-head">вЪљ Gols</div><div class="events-wrap">`
        goals_ev.forEach(e=>{
          const isHome = e.team.id===f.teams.home.id
          html += `<div class="ev-row">
            <span class="ev-min">${e.time.elapsed}'</span>
            <span class="ev-icon">${e.detail==='Own Goal'?'рЯФі':'вЪљ'}</span>
            <div class="ev-info">
              <div class="ev-player">${e.player.name}</div>
              ${e.assist.name?`<div class="ev-detail">Ass: ${e.assist.name}</div>`:''}
              ${e.detail==='Own Goal'?'<div class="ev-detail" style="color:var(--live)">Gol contra</div>':''}
            </div>
            <span class="ev-team">${isHome?f.teams.home.name:f.teams.away.name}</span>
          </div>`
        })
        html += `</div></div>`
      }

      if(cards_ev.length){
        html += `<div class="card-wrap"><div class="card-head">рЯЯ® Cart√µes</div><div class="events-wrap">`
        cards_ev.forEach(e=>{
          const isRed = e.detail==='Red Card'||e.detail==='Yellow Red Card'
          html += `<div class="ev-row">
            <span class="ev-min">${e.time.elapsed}'</span>
            <span class="ev-icon" style="color:${isRed?'var(--live)':'var(--yellow)'}">${isRed?'рЯЯ•':'рЯЯ®'}</span>
            <div class="ev-info">
              <div class="ev-player">${e.player.name}</div>
              <div class="ev-detail">${e.detail}</div>
            </div>
            <span class="ev-team">${e.team.name}</span>
          </div>`
        })
        html += `</div></div>`
      }

      if(subs_ev.length){
        html += `<div class="card-wrap"><div class="card-head">рЯФД Substitui√І√µes</div><div class="events-wrap">`
        subs_ev.forEach(e=>{
          html += `<div class="ev-row">
            <span class="ev-min">${e.time.elapsed}'</span>
            <span class="ev-icon">рЯФД</span>
            <div class="ev-info">
              <div class="ev-player" style="color:var(--green)">вЦ≤ ${e.assist.name}</div>
              <div class="ev-detail" style="color:var(--live)">вЦЉ ${e.player.name}</div>
            </div>
            <span class="ev-team">${e.team.name}</span>
          </div>`
        })
        html += `</div></div>`
      }
    }

    setPage(html)
  } catch(e){ showErr(e.message, 'renderMatch()') }
}

function buildMatchList(fixtures){
  if(!fixtures.length) return `<div class="empty"><div class="empty-ico">рЯШі</div><p>Nenhuma partida encontrada.</p></div>`
  const groups={}
  fixtures.forEach(f=>{
    const k=f.fixture.date.slice(0,10)
    if(!groups[k]) groups[k]=[]
    groups[k].push(f)
  })
  return `<div class="match-list">`+Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,fs])=>{
    let label=date
    try{
      const d=new Date(date+'T12:00:00'),today=new Date(),y=new Date(today),t=new Date(today)
      y.setDate(y.getDate()-1);t.setDate(t.getDate()+1)
      if(d.toDateString()===today.toDateString()) label='Hoje'
      else if(d.toDateString()===y.toDateString()) label='Ontem'
      else if(d.toDateString()===t.toDateString()) label='Amanh√£'
      else label=d.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'2-digit'})
    }catch{}
    return `<div class="match-grp">
      <div class="grp-head"><span class="grp-date">${label}</span><span class="grp-n">${fs.length} jogos</span></div>
      ${fs.map(f=>buildMatchCard(f)).join('')}
    </div>`
  }).join('')+`</div>`
}

function buildMatchCard(f){
  const st = f.fixture.status.short
  const isLive = ['1H','2H','HT','ET','P'].includes(st)
  const isFin  = st==='FT'||st==='AET'||st==='PEN'
  const h=f.goals.home, a=f.goals.away
  const hasScore = h!==null&&a!==null
  const homeWin = hasScore&&h>a, awayWin=hasScore&&a>h
  let timeStr=''
  try{timeStr=new Date(f.fixture.date).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}catch{}
  const badge = isLive
    ? `<span class="badge-live">${f.fixture.status.elapsed?f.fixture.status.elapsed+"'":'AO VIVO'}</span>`
    : isFin ? `<span class="badge-ft">FT</span>`
    : `<span class="badge-ns">${timeStr}</span>`
  const hN=f.teams.home.name, aN=f.teams.away.name

  return `<div class="mcard ${isLive?'live':''}" onclick="openMatch(${f.fixture.id})">
    <div class="mteam">
      <img class="tcrest" src="${f.teams.home.logo}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(hN)}&background=1a2235&color=fff&size=24'" />
      <span class="tname ${homeWin?'win':isFin&&awayWin?'lose':''}">${hN}</span>
    </div>
    <div class="mcenter">
      ${hasScore
        ? `<div class="mscore"><span>${h}</span><span class="mscore-sep">:</span><span>${a}</span></div>`
        : `<div class="mtime">${timeStr||'--:--'}</div>`}
      ${badge}
    </div>
    <div class="mteam away">
      <span class="tname r ${awayWin?'win':isFin&&homeWin?'lose':''}">${aN}</span>
      <img class="tcrest" src="${f.teams.away.logo}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(aN)}&background=1a2235&color=fff&size=24'" />
    </div>
  </div>`
}

function buildStandings(rows){
  if(!rows.length) return `<div class="empty"><p>Classifica√І√£o n√£o dispon√≠vel.</p></div>`
  const n=rows.length
  let html=`<div class="card-wrap" style="margin:0 0 14px"><div class="st-wrap"><table class="st-table"><thead><tr>
    <th>#</th><th>Time</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th><th>Pts</th><th>Forma</th>
  </tr></thead><tbody>`
  rows.forEach(r=>{
    const p=r.rank,sg=r.goalsDiff
    const pc=p<=4?'p-cl':p===5?'p-el':p>n-3?'p-rl':''
    const zc=p<=4?'z-cl':p===5?'z-el':p>n-3?'z-rl':''
    const form=(r.form||'').split('').slice(-5)
    const fh=form.map(f=>`<span class="fb ${f==='W'?'fw':f==='D'?'fd':'fl'}">${f==='W'?'V':f==='D'?'E':'D'}</span>`).join('')
    html+=`<tr class="${zc}">
      <td><span class="pnum ${pc}">${p}</span></td>
      <td class="tn"><div class="tcell">
        <img src="${r.team.logo}" style="width:18px;height:18px;object-fit:contain;flex-shrink:0" onerror="this.style.display='none'" />
        ${r.team.name}
      </div></td>
      <td>${r.all.played}</td><td>${r.all.win}</td><td>${r.all.draw}</td><td>${r.all.lose}</td>
      <td>${r.all.goals.for}</td><td>${r.all.goals.against}</td>
      <td style="font-weight:600;color:${sg>0?'var(--green)':sg<0?'var(--live)':'var(--text2)'}">${sg>0?'+':''}${sg}</td>
      <td><strong style="color:var(--text)">${r.points}</strong></td>
      <td><div class="form-r">${fh}</div></td>
    </tr>`
  })
  html+=`</tbody></table>
  <div class="leg-row">
    <span class="leg"><span class="ldot" style="background:var(--accent)"></span>Champions League</span>
    <span class="leg"><span class="ldot" style="background:var(--yellow)"></span>Europa League</span>
    <span class="leg"><span class="ldot" style="background:var(--live)"></span>Rebaixamento</span>
  </div></div>`
  return html
}

function buildPlayers(scorers){
  if(!scorers.length) return `<div class="empty"><p>Dados de jogadores n√£o dispon√≠veis.</p></div>`
  return `<div class="player-grid">`+scorers.slice(0,20).map((s,i)=>{
    const st=s.statistics[0]
    const goals=st.goals.total||0
    const assists=st.goals.assists||0
    const rating=parseFloat(st.games.rating||0).toFixed(1)
    const ratingPct=Math.round(parseFloat(st.games.rating||0)/10*100)
    const pos={Attacker:'Atacante',Midfielder:'Meia',Defender:'Defensor',Goalkeeper:'Goleiro'}[st.games.position]||st.games.position||'вАФ'
    const medals=['рЯ•З','рЯ•И','рЯ•Й']
    return `<div class="player-card">
      <img class="player-photo" src="${s.player.photo||''}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(s.player.name)}&background=1a2235&color=fff&size=52&rounded=true'" />
      <div class="player-info">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <span style="font-size:14px">${medals[i]||'#'+(i+1)}</span>
          <span class="player-name">${s.player.name}</span>
        </div>
        <div class="player-pos">${s.team.name} ¬Ј ${pos} ¬Ј ${s.player.nationality||''}</div>
        <div class="player-stats">
          <div class="pstat"><div class="pstat-val">${goals}</div><div class="pstat-label">Gols</div></div>
          <div class="pstat"><div class="pstat-val" style="color:var(--accent2)">${assists}</div><div class="pstat-label">Ass.</div></div>
          <div class="pstat"><div class="pstat-val" style="color:var(--yellow)">${st.games.appearences||0}</div><div class="pstat-label">Jogos</div></div>
        </div>
      </div>
      <div class="player-rating">
        <div class="rating-circle" style="--pct:${ratingPct}">
          <div class="rating-inner">${rating}</div>
        </div>
      </div>
    </div>`
  }).join('')+`</div>`
}

function buildOdds(oddsData, nextFixtures){
  let html = ''
  if(!oddsData.length && !nextFixtures.length){
    return `<div class="empty"><div class="empty-ico">рЯО∞</div><p>Odds n√£o dispon√≠veis no momento.</p><p style="font-size:12px;color:var(--text3);margin-top:6px">As odds aparecem para jogos agendados nas pr√≥ximas horas.</p></div>`
  }
  if(oddsData.length){
    html += `<div class="odds-panel">`
    oddsData.forEach(({fixture:f, odds:o})=>{
      const bms = o.bookmakers||[]
      let dt=''; try{dt=new Date(f.fixture.date).toLocaleString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}catch{}
      html += `<div class="odds-match">
        <div class="odds-match-head">
          <div class="omh-teams">${f.teams.home.name} vs ${f.teams.away.name}</div>
          <div class="omh-date">${dt}</div>
        </div>
        <div class="odds-bookmakers">`
      bms.slice(0,4).forEach(bm=>{
        const bet = bm.bets?.find(b=>b.name==='Match Winner')
        if(!bet) return
        const vals = bet.values
        const h=parseFloat(vals.find(v=>v.value==='Home')?.odd||0)
        const d=parseFloat(vals.find(v=>v.value==='Draw')?.odd||0)
        const a=parseFloat(vals.find(v=>v.value==='Away')?.odd||0)
        const maxO=Math.max(h,d,a)
        // Probabilidade impl√≠cita
        const ph = h ? Math.round(1/h*100) : 0
        const pd = d ? Math.round(1/d*100) : 0
        const pa = a ? Math.round(1/a*100) : 0
        html += `<div class="odds-row">
          <span class="odds-bm">${bm.name}</span>
          <div class="odds-vals">
            <div class="oval ${h===maxO?'best-odd':''}"><span class="oval-label">Casa</span><span class="oval-val">${h.toFixed(2)}</span><span class="oval-pct">${ph}%</span></div>
            <div class="oval ${d===maxO?'best-odd':''}"><span class="oval-label">Empate</span><span class="oval-val">${d.toFixed(2)}</span><span class="oval-pct">${pd}%</span></div>
            <div class="oval ${a===maxO?'best-odd':''}"><span class="oval-label">Fora</span><span class="oval-val">${a.toFixed(2)}</span><span class="oval-pct">${pa}%</span></div>
          </div>
        </div>`
      })
      html += `</div></div>`
    })
    html += `</div>`
  } else {
    // Sem odds da API, mostra pr√≥ximos jogos com odds simuladas
    html = `<div class="odds-panel">`
    nextFixtures.forEach(f=>{
      let dt=''; try{dt=new Date(f.fixture.date).toLocaleString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}catch{}
      html += `<div class="odds-match">
        <div class="odds-match-head">
          <div class="omh-teams">${f.teams.home.name} vs ${f.teams.away.name}</div>
          <div class="omh-date">${dt}</div>
        </div>
        <div style="padding:12px 16px;font-size:12px;color:var(--text3)">
          рЯТ° Odds dispon√≠veis no plano pago da API-Football. No plano gratuito (100 req/dia) as odds t√™m acesso limitado.
        </div>
      </div>`
    })
    html += `</div>`
  }
  return html
}

function openMatch(id){
  state.matchId=id
  state.page='match'
  document.querySelectorAll('.nitem').forEach(e=>e.classList.remove('on'))
  render()
}
